name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Unit tests (with coverage)
        run: npm run test:coverage
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:3001

  # ── Gateway ───────────────────────────────────────────────────────────────
  test-gateway:
    name: Gateway — Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/gateway/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: backend/gateway

      - name: Run tests
        run: npm test
        working-directory: backend/gateway
        env:
          NODE_ENV: test

  # ── AI Service ────────────────────────────────────────────────────────────
  test-backend:
    name: AI Service — pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r backend/ai-service/requirements.txt

      - name: Seed test DB
        run: |
          PGPASSWORD=testpass psql -h localhost -U postgres -d testdb \
            -f backend/ai-service/tests/fixtures/seed.sql

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            backend/ai-service/tests/
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_TEST }}

  # ── Docker build validation ────────────────────────────────────────────────
  build-images:
    name: Docker — Build Images
    needs: [test-frontend, test-gateway, test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AI service image
        run: |
          docker build \
            --tag ai-service:${{ github.sha }} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            backend/ai-service

      - name: Build gateway image
        run: |
          docker build \
            --tag gateway:${{ github.sha }} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            backend/gateway
