name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build, Push & Deploy to Azure
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Azure login ─────────────────────────────────────────────────────
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── ACR login ───────────────────────────────────────────────────────
      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & push AI service ─────────────────────────────────────────
      - name: Build & push AI service
        run: |
          docker build \
            --tag ${{ secrets.ACR_NAME }}.azurecr.io/ai-service:${{ github.sha }} \
            --tag ${{ secrets.ACR_NAME }}.azurecr.io/ai-service:latest \
            backend/ai-service
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/ai-service:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/ai-service:latest

      # ── Build & push Gateway ─────────────────────────────────────────────
      - name: Build & push Gateway
        run: |
          docker build \
            --tag ${{ secrets.ACR_NAME }}.azurecr.io/gateway:${{ github.sha }} \
            --tag ${{ secrets.ACR_NAME }}.azurecr.io/gateway:latest \
            backend/gateway
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/gateway:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/gateway:latest

      # ── Deploy AI service ───────────────────────────────────────────────
      - name: Deploy AI service to Azure Function (Container)
        uses: azure/functions-container-action@v1
        with:
          app-name: ai-service-func
          image: ${{ secrets.ACR_NAME }}.azurecr.io/ai-service:${{ github.sha }}

      # ── Deploy Gateway ───────────────────────────────────────────────────
      - name: Deploy Gateway to Azure Function (Container)
        uses: azure/functions-container-action@v1
        with:
          app-name: gateway-func
          image: ${{ secrets.ACR_NAME }}.azurecr.io/gateway:${{ github.sha }}

      # ── Build frontend ───────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AZURE_AD_CLIENT_ID: ${{ secrets.VITE_AZURE_AD_CLIENT_ID }}
          VITE_AZURE_AD_TENANT_ID: ${{ secrets.VITE_AZURE_AD_TENANT_ID }}

      # ── Deploy frontend to Azure Static Web Apps ─────────────────────────
      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist

      # ── Tag deployment in Git ─────────────────────────────────────────────
      - name: Tag deployment
        run: |
          git tag "deploy-$(date +%Y%m%d%H%M%S)-${{ github.sha }}"
          git push --tags || true
